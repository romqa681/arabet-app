<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARAWINBET — Букмекерская контора</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc66;
            --bg: #0a0a0a;
            --bg2: #111111;
            --bg3: #1a1a1a;
            --bg4: #222222;
            --red: #ff3333;
            --gold: #ffd700;
            --text: #ffffff;
            --text2: #aaaaaa;
            --text3: #666666;
            --border: #333333;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 80px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* HEADER */
        .header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }
        
        .header-inner {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .balance-badge {
            background: var(--bg3);
            padding: 8px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        
        /* HERO */
        .hero {
            margin-top: 56px;
            height: 200px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=800');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        
        .hero-text {
            z-index: 1;
        }
        
        .hero h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .hero p {
            font-size: 0.9rem;
            color: #ccc;
            margin-top: 4px;
        }
        
        /* STATS BAR */
        .stats-bar {
            background: var(--bg2);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        
        /* TABS */
        .tabs {
            display: flex;
            background: var(--bg2);
            overflow-x: auto;
            padding: 8px;
            gap: 6px;
            position: sticky;
            top: 56px;
            z-index: 999;
        }
        
        .tab {
            padding: 10px 20px;
            background: var(--bg3);
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
            border: none;
            color: var(--text2);
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--primary);
            color: #000;
        }
        
        /* SPORT FILTERS */
        .sport-filters {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 10px 12px;
            background: var(--bg);
        }
        
        .sport-chip {
            padding: 7px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.8rem;
            color: var(--text2);
        }
        
        .sport-chip.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }
        
        /* MATCH CARD */
        .match-card {
            background: var(--bg2);
            margin: 8px 12px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .match-card.live {
            border: 2px solid var(--red);
        }
        
        .match-head {
            padding: 10px 14px;
            background: var(--bg3);
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text2);
        }
        
        .live-tag {
            color: var(--red);
            font-weight: 700;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .match-teams {
            display: flex;
            padding: 14px;
            align-items: center;
        }
        
        .team {
            flex: 1;
            text-align: center;
        }
        
        .team-name {
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .team-score {
            font-size: 1.8rem;
            font-weight: 900;
            margin-top: 2px;
        }
        
        .team-score.live {
            color: var(--red);
        }
        
        .match-vs {
            color: var(--text3);
            font-size: 1.2rem;
            padding: 0 10px;
        }
        
        .match-odds {
            display: flex;
            gap: 6px;
            padding: 0 14px 14px;
        }
        
        .odd-btn {
            flex: 1;
            padding: 12px 6px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .odd-btn:active {
            transform: scale(0.95);
        }
        
        .odd-btn .odd-type {
            font-size: 0.65rem;
            color: var(--text3);
        }
        
        .odd-btn .odd-val {
            font-size: 1rem;
            font-weight: 700;
        }
        
        .odd-btn.selected {
            background: var(--primary) !important;
            color: #000 !important;
            border-color: var(--primary) !important;
        }
        
        .odd-btn.selected .odd-type {
            color: #000 !important;
        }
        
        /* CASINO */
        .casino-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 12px;
        }
        
        .casino-card {
            background: linear-gradient(145deg, var(--bg2), var(--bg3));
            border-radius: 14px;
            padding: 20px 14px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        
        .casino-card:active {
            transform: scale(0.96);
            border-color: var(--primary);
        }
        
        .casino-card .game-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        
        .casino-card .game-name {
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .casino-card .game-info {
            font-size: 0.7rem;
            color: var(--text3);
            margin-top: 2px;
        }
        
        /* COUPON */
        .coupon {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg2);
            border-top: 3px solid var(--primary);
            max-height: 60vh;
            overflow-y: auto;
            z-index: 2000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .coupon.open {
            transform: translateY(0);
        }
        
        .coupon-head {
            padding: 14px;
            background: var(--bg3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }
        
        .coupon-body {
            padding: 14px;
        }
        
        .coupon-item {
            background: var(--bg3);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        
        .coupon-item .remove {
            color: var(--red);
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .btn-bet {
            background: var(--primary);
            color: #000;
        }
        
        .btn-clear {
            background: transparent;
            color: var(--text3);
            border: 1px solid var(--border);
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        /* INPUT */
        .input {
            width: 100%;
            padding: 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            outline: none;
        }
        
        .input:focus {
            border-color: var(--primary);
        }
        
        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg2);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid var(--border);
            z-index: 3000;
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            color: var(--text3);
            font-size: 0.7rem;
            transition: all 0.2s;
            position: relative;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-item .icon {
            font-size: 1.3rem;
        }
        
        .nav-badge {
            position: absolute;
            top: -4px;
            right: 10px;
            background: var(--red);
            color: #fff;
            font-size: 0.6rem;
            padding: 1px 5px;
            border-radius: 50%;
            display: none;
        }
        
        /* EMPTY STATE */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text3);
        }
        
        .empty .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-inner">
            <div class="logo">
                <span>🅰️</span> ARAWIN<span style="color:#fff;">BET</span>
            </div>
            <div class="balance-badge" onclick="showProfile()">
                💰 <span id="balance">15,000</span> ₽
            </div>
        </div>
    </div>
    
    <!-- HERO -->
    <div class="hero">
        <div class="hero-text">
            <h1>ARAWINBET</h1>
            <p>🏔️ Премиум букмекерская контора</p>
        </div>
    </div>
    
    <!-- STATS -->
    <div class="stats-bar">
        <span>👥 Онлайн: <b style="color:var(--primary);" id="online">1,247</b></span>
        <span>💎 Выплачено: <b>12.4M ₽</b></span>
    </div>
    
    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('line', this)">📊 ЛИНИЯ</button>
        <button class="tab" onclick="switchTab('live', this)">🔴 LIVE</button>
        <button class="tab" onclick="switchTab('casino', this)">🎰 КАЗИНО</button>
    </div>
    
    <!-- SPORT FILTERS -->
    <div class="sport-filters" id="sportFilters">
        <button class="sport-chip active" onclick="filterSport('all', this)">🔥 Все</button>
        <button class="sport-chip" onclick="filterSport('football', this)">⚽ Футбол</button>
        <button class="sport-chip" onclick="filterSport('tennis', this)">🎾 Теннис</button>
        <button class="sport-chip" onclick="filterSport('basketball', this)">🏀 Баскетбол</button>
        <button class="sport-chip" onclick="filterSport('hockey', this)">🏒 Хоккей</button>
    </div>
    
    <!-- CONTENT -->
    <div id="content"></div>
    
    <!-- COUPON -->
    <div class="coupon" id="coupon">
        <div class="coupon-head">
            <b>📋 Купон (<span id="cpCount">0</span>)</b>
            <span onclick="toggleCoupon()" style="cursor:pointer;font-size:1.3rem;">✕</span>
        </div>
        <div class="coupon-body">
            <div id="cpItems"></div>
            <div style="padding:8px 0;border-top:1px solid var(--border);">
                <div style="display:flex;justify-content:space-between;margin:8px 0;">Общий кэф: <b id="cpOdd" style="color:var(--primary);">1.00</b></div>
                <input type="number" id="cpStake" value="500" min="10" class="input" placeholder="Сумма ставки">
                <div style="display:flex;justify-content:space-between;margin:8px 0;">Выигрыш: <b id="cpWin" style="color:var(--primary);">500 ₽</b></div>
                <button class="btn btn-bet" onclick="placeBet()">🎯 СДЕЛАТЬ СТАВКУ</button>
                <button class="btn btn-clear" onclick="clearCoupon()">🗑 Очистить</button>
            </div>
        </div>
    </div>
    
    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('line')"><div class="icon">⚽</div>Линия</div>
        <div class="nav-item" onclick="switchTab('live')"><div class="icon">🔴</div>LIVE</div>
        <div class="nav-item" onclick="toggleCoupon()" style="position:relative;"><div class="icon">📋</div>Купон<span class="nav-badge" id="navBadge">0</span></div>
        <div class="nav-item" onclick="showProfile()"><div class="icon">👤</div>Профиль</div>
    </div>
    
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
