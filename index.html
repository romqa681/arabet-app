    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        /* ХЕДЕР */

        .bal-btn{background:#1a2a32;padding:8px 16px;border-radius:30px;font-weight:700;font-size:.85rem;cursor:pointer;border:1px solid rgba(0,229,255,.3);color:#00e5ff}
        .support-btn{background:transparent;border:1px solid #00e5ff;color:#00e5ff;padding:8px 16px;border-radius:30px;font-weight:600;cursor:pointer;font-size:.8rem}
        
        /* БАННЕР */
        .hero{background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),url('https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=1200');background-size:cover;background-position:center;padding:30px 16px;text-align:center;border-bottom:1px solid rgba(0,229,255,.2)}
        .hero h1{font-size:1.8rem;font-weight:800;color:#00e5ff;margin-bottom:6px}
        .hero p{color:#a0b8c4;font-size:.95rem;margin-bottom:16px}
        .hero .bonus-btn{background:linear-gradient(135deg,#00e5ff,#0088cc);color:#000;border:none;padding:12px 28px;border-radius:30px;font-weight:700;font-size:.9rem;cursor:pointer}

        /* НАВИГАЦИЯ */
        .nav-tabs{display:flex;background:#0d151c;padding:6px 8px;gap:6px;overflow-x:auto;position:sticky;top:64px;z-index:999;border-bottom:1px solid #1a2a32}

        .sports-bar::-webkit-scrollbar{display:none}
        .sport-btn{padding:8px 16px;background:#1a2a32;border:1px solid #1a2a32;border-radius:30px;color:#8899aa;font-weight:600;cursor:pointer;white-space:nowrap;font-size:11px;transition:.2s}
        .sport-btn.on{background:#00e5ff;color:#000;border-color:#00e5ff}
        
        /* КОНТЕНТ */
        .content{padding:10px 12px}
        
        /* КАРТОЧКА МАТЧА */
        .match-card{background:#111b22;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #1a2a32;transition:.2s;cursor:pointer}
        .match-card.live{border-left:3px solid #e63946}

        .live-badge{color:#e63946;font-weight:700;animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .match-teams{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;margin-bottom:12px}
        .match-score{font-size:22px;font-weight:900;color:#e63946}
        .match-odds{display:flex;gap:6px}
        .odd-btn{flex:1;background:#1a2a32;border:1px solid transparent;color:#fff;padding:12px 6px;border-radius:10px;text-align:center;cursor:pointer;font-weight:700;font-size:13px;transition:.15s}
        .odd-btn:hover{background:#00e5ff;color:#000}
        .odd-btn.sel{background:#00e5ff!important;color:#000!important}
        .odd-btn .odd-label{font-size:9px;color:#8899aa;display:block}
        .odd-btn.sel .odd-label{color:#000}
        
        /* КАЗИНО */
        .casino-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
        .casino-card{background:#111b22;border-radius:16px;padding:22px 14px;text-align:center;cursor:pointer;border:1px solid #1a2a32;transition:.2s}
        .casino-card:hover{border-color:#00e5ff}
        .casino-card:active{transform:scale(.96)}
        .casino-card .game-icon{font-size:42px;margin-bottom:6px}
        .casino-card .game-name{font-weight:700;font-size:14px}
        .casino-card .game-info{font-size:10px;color:#8899aa;margin-top:2px}
        
        /* КУПОН */
        .coupon-empty{text-align:center;padding:40px;color:#8899aa}
        .coupon-item{background:#1a2a32;padding:14px;border-radius:12px;margin-bottom:8px;position:relative;border-left:3px solid #00e5ff}
        .coupon-item .remove-btn{position:absolute;top:10px;right:14px;color:#e63946;cursor:pointer;font-size:16px}
        .coupon-total{background:#111b22;border-radius:16px;padding:20px;text-align:center;border:1px solid #00e5ff;margin-top:16px}
        .coupon-total .total-odds{font-size:24px;font-weight:900;color:#00e5ff}
        
        /* КНОПКИ */
        .btn{width:100%;padding:14px;border:none;border-radius:30px;font-weight:700;font-size:14px;cursor:pointer;margin-top:8px;text-transform:uppercase;letter-spacing:.5px;transition:.2s}
        .btn:active{transform:scale(.97)}
        .btn-primary{background:linear-gradient(135deg,#00e5ff,#0088cc);color:#000;box-shadow:0 6px 20px rgba(0,229,255,.3)}
        .btn-outline{background:transparent;border:2px solid #00e5ff;color:#00e5ff}
        .btn-danger{background:transparent;border:1px solid #e63946;color:#e63946;font-size:11px;padding:8px}
        
        /* ИНПУТ */
        .input{width:100%;padding:12px;background:#1a2a32;border:1px solid #1a2a32;border-radius:12px;color:#fff;font-size:15px;font-weight:600;text-align:center;outline:none;margin:8px 0}
        .input:focus{border-color:#00e5ff}
        
        /* НИЖНЯЯ НАВИГАЦИЯ */
        .bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:rgba(10,15,20,.95);backdrop-filter:blur(18px);display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid rgba(0,229,255,.2);z-index:300}
        .nav-item{color:#8899aa;display:flex;flex-direction:column;align-items:center;font-size:10px;gap:2px;background:none;border:none;cursor:pointer;position:relative}
        .nav-item.on{color:#00e5ff}
        .nav-item .icon{font-size:18px}
        .nav-badge{position:absolute;top:-2px;right:8px;background:#e63946;color:#fff;border-radius:50%;padding:1px 5px;font-size:9px;display:none}
        
        /* ИГРОВОЙ ЭКРАН */
        .game-screen{text-align:center;padding:16px}
        .game-screen h2{color:#00e5ff;margin-bottom:12px}
        .slot-reels{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:#1a2a32;padding:12px;border-radius:14px;margin:12px 0}
        .slot-symbol{font-size:30px;padding:10px;background:#111b22;border-radius:8px;text-align:center}
        .crash-display{background:#111b22;border-radius:14px;padding:30px;margin:12px 0;font-size:48px;font-weight:900;color:#00e5ff}
        
        /* МОДАЛКА */
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:.3s}
        .modal.open{opacity:1;visibility:visible}
        .modal-box{background:#111b22;border-radius:20px;padding:28px;text-align:center;max-width:340px;width:90%;border:2px solid #00e5ff}
        .modal-box h3{color:#00e5ff;margin-bottom:10px}
        .modal-box .win-amount{font-size:32px;font-weight:900;color:#00e5ff}
        
        @media(max-width:600px){.logo-text{font-size:1.1rem}.hero h1{font-size:1.4rem}}
    </style>
</head>
<body>
    <!-- ХЕДЕР -->
    <header class="header">
        <div class="logo-area">
            <span class="logo-icon">🏔️</span>
            <span class="logo-text">ARAWINBET</span>
        </div>
        <div class="header-actions">
            <button class="support-btn" onclick="window.open('https://t.me/romqa68','_blank')">💬 Поддержка</button>
            <div class="bal-btn" onclick="showProfile()">💰 <span id="bal">15,000</span> $</div>
        </div>
    </header>

    <!-- БАННЕР -->
    <div class="hero">
        <h1>🏔️ ARAWINBET — СТАВКИ НА СПОРТ</h1>
        <p>🔥 Бонус 100% на первый депозит до 1000$ + фрибет 50$</p>
        <button class="bonus-btn" onclick="showProfile()">ПОЛУЧИТЬ БОНУС</button>
    </div>

    <!-- СТАТСБАР -->
    <div class="stats-bar">
        <span>👥 Онлайн: <b style="color:#00e5ff;" id="onlineCount">1,247</b></span>
        <span>💎 Выплачено сегодня: <b>2.4M $</b></span>
        <span>📊 Событий: <b>17</b></span>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="nav-tabs">
        <button class="tab on" onclick="switchTab('line', this)">⚽ ЛИНИЯ</button>
        <button class="tab" onclick="switchTab('live', this)">🔴 LIVE <span style="font-size:9px;background:#e63946;color:#fff;padding:1px 6px;border-radius:10px;">8</span></button>
        <button class="tab" onclick="switchTab('casino', this)">🎰 КАЗИНО</button>
        <button class="tab" onclick="switchTab('coupon', this)">🎟️ КУПОН</button>
    </div>

    <!-- ФИЛЬТРЫ -->
    <div class="sports-bar" id="sportsBar">
        <button class="sport-btn on" onclick="filterSport('all', this)">🔥 Все</button>
        <button class="sport-btn" onclick="filterSport('football', this)">⚽ Футбол</button>
        <button class="sport-btn" onclick="filterSport('tennis', this)">🎾 Теннис</button>
        <button class="sport-btn" onclick="filterSport('basketball', this)">🏀 Баскетбол</button>
        <button class="sport-btn" onclick="filterSport('hockey', this)">🏒 Хоккей</button>
    </div>

    <!-- КОНТЕНТ -->
    <main class="content" id="content"></main>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <nav class="bottom-nav">
        <button class="nav-item on" onclick="switchTab('line')"><span class="icon">⚽</span>Линия</button>
        <button class="nav-item" onclick="switchTab('live')"><span class="icon">🔴</span>LIVE</button>
        <button class="nav-item" onclick="switchTab('casino')"><span class="icon">🎰</span>Казино</button>
        <button class="nav-item" onclick="switchTab('coupon')" style="position:relative;"><span class="icon">🎟️</span>Купон<span class="nav-badge" id="cpBadge">0</span></button>
        <button class="nav-item" onclick="showProfile()"><span class="icon">👤</span>Профиль</button>
    </nav>

    <!-- МОДАЛКА ВЫИГРЫША -->
    <div class="modal" id="winModal">
        <div class="modal-box">
            <h3>✅ СТАВКА ПРИНЯТА!</h3>
            <div class="win-amount" id="modalAmt"></div>
            <p style="color:#8899aa;margin:8px 0;" id="modalInfo"></p>
            <button class="btn btn-primary" onclick="document.getElementById('winModal').classList.remove('open')">ОК</button>
        </div>
    </div>

<script>
const tg=window.Telegram.WebApp;tg.ready();tg.expand();
const $=id=>document.getElementById(id);
const F=n=>Number(n||0).toLocaleString('ru-RU');

// 17 реальных матчей
const MATCHES=[
  {id:1,s:'football',lg:'Лига Чемпионов',t1:'Реал Мадрид',t2:'Ман Сити',tm:'22:00',live:true,sc:[2,1],min:68,od:{w1:2.45,x:3.40,w2:2.80}},
  {id:2,s:'football',lg:'Лига Чемпионов',t1:'Арсенал',t2:'Бавария',tm:'22:00',live:true,sc:[1,1],min:55,od:{w1:2.10,x:3.50,w2:3.20}},
  {id:3,s:'football',lg:'АПЛ',t1:'Ливерпуль',t2:'Кристал Пэлас',tm:'17:00',live:false,od:{w1:1.22,x:6.50,w2:11.0}},
  {id:4,s:'football',lg:'АПЛ',t1:'Ман Юнайтед',t2:'Ньюкасл',tm:'19:30',live:true,sc:[0,1],min:34,od:{w1:2.80,x:3.50,w2:2.30}},
  {id:5,s:'football',lg:'АПЛ',t1:'Челси',t2:'Эвертон',tm:'22:00',live:false,od:{w1:1.70,x:3.80,w2:4.50}},
  {id:6,s:'football',lg:'Ла Лига',t1:'Барселона',t2:'Кадис',tm:'22:00',live:false,od:{w1:1.18,x:7.00,w2:14.0}},
  {id:7,s:'football',lg:'Серия А',t1:'Интер',t2:'Кальяри',tm:'21:45',live:true,sc:[2,0],min:61,od:{w1:1.15,x:7.50,w2:17.0}},
  {id:8,s:'football',lg:'Серия А',t1:'Милан',t2:'Лечче',tm:'16:00',live:false,od:{w1:1.55,x:4.00,w2:5.20}},
  {id:9,s:'football',lg:'Бундеслига',t1:'Байер',t2:'Вердер',tm:'19:30',live:true,sc:[3,0],min:72,od:{w1:1.08,x:9.00,w2:23.0}},
  {id:10,s:'football',lg:'РПЛ',t1:'Зенит',t2:'Краснодар',tm:'19:00',live:true,sc:[1,0],min:44,od:{w1:1.50,x:4.00,w2:5.50}},
  {id:11,s:'football',lg:'РПЛ',t1:'Спартак',t2:'ЦСКА',tm:'16:30',live:false,od:{w1:2.50,x:3.10,w2:2.70}},
  {id:12,s:'tennis',lg:'ATP Тур',t1:'Я. Синнер',t2:'Н. Джокович',tm:'16:00',live:true,sc:[1,0],od:{w1:1.85,w2:1.95}},
  {id:13,s:'tennis',lg:'WTA Тур',t1:'И. Швёнтек',t2:'А. Соболенко',tm:'14:00',live:false,od:{w1:1.55,w2:2.40}},
  {id:14,s:'basketball',lg:'НБА',t1:'Лейкерс',t2:'Селтикс',tm:'05:30',live:false,od:{w1:2.10,w2:1.70}},
  {id:15,s:'basketball',lg:'НБА',t1:'Голден Стэйт',t2:'Милуоки',tm:'03:00',live:true,sc:[98,102],min:42,od:{w1:1.90,w2:1.85}},
  {id:16,s:'hockey',lg:'НХЛ',t1:'Тампа-Бэй',t2:'Рейнджерс',tm:'03:00',live:false,od:{w1:1.85,x:4.00,w2:3.20}},
  {id:17,s:'hockey',lg:'КХЛ',t1:'СКА',t2:'Ак Барс',tm:'19:30',live:true,sc:[3,2],min:52,od:{w1:1.50,x:4.50,w2:5.50}}
];

let balance=15000,slip=[],currentTab='line',currentSport='all';

document.addEventListener('DOMContentLoaded',()=>{
  updateBalance();
  renderMatches();
  setInterval(()=>{$('onlineCount').textContent=F(Math.floor(1000+Math.random()*500));},5000);
});

function updateBalance(){$('bal').textContent=F(balance);}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  document.querySelectorAll('.nav-item').forEach((n,i)=>{n.classList.remove('on');const map={line:0,live:1,casino:2,coupon:3};if(map[tab]===i)n.classList.add('on');});
  if(tab==='casino')renderCasino();
  else if(tab==='coupon')renderCouponPage();
  else{$('sportsBar').style.display='flex';renderMatches();}
}

function filterSport(sport,el){
  currentSport=sport;
  document.querySelectorAll('.sport-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderMatches();
}

function renderMatches(){
  let matches=currentTab==='live'?MATCHES.filter(m=>m.live):MATCHES;
  if(currentSport!=='all')matches=matches.filter(m=>m.s===currentSport);
  const c=$('content');
  if(!matches.length){c.innerHTML='<div style="text-align:center;padding:40px;color:#8899aa;">🏔️ Нет матчей по выбранным фильтрам</div>';return;}
  let html='';
  matches.forEach(m=>{
    const time=m.live?`<span class="live-badge">🔴 LIVE ${m.min}'</span>`:`🕐 ${m.tm}`;
    const s1=m.live&&m.sc?`<div class="match-score">${m.sc[0]}</div>`:'';
    const s2=m.live&&m.sc?`<div class="match-score">${m.sc[1]}</div>`:'';
    const xb=m.od.x?`<div class="odd-btn" data-id="${m.id}" data-tp="x" data-od="${m.od.x}" data-nm="X" onclick="toggleBet(this)"><span class="odd-label">X</span>${m.od.x}</div>`:'';
    html+=`<div class="match-card ${m.live?'live':''}">
      <div class="match-head"><span>${m.lg}</span>${time}</div>
      <div class="match-teams"><span>${m.t1}${s1}</span><span style="color:#8899aa;">VS</span><span>${m.t2}${s2}</span></div>
      <div class="match-odds">
        <div class="odd-btn" data-id="${m.id}" data-tp="w1" data-od="${m.od.w1}" data-nm="П1" onclick="toggleBet(this)"><span class="odd-label">П1</span>${m.od.w1}</div>
        ${xb}
        <div class="odd-btn" data-id="${m.id}" data-tp="w2" data-od="${m.od.w2||m.od.w1}" data-nm="П2" onclick="toggleBet(this)"><span class="odd-label">П2</span>${m.od.w2||m.od.w1}</div>
      </div>
    </div>`;
  });
  c.innerHTML=html;highlightSlip();
}

function toggleBet(el){
  const id=parseInt(el.dataset.id),tp=el.dataset.tp,od=parseFloat(el.dataset.od),nm=el.dataset.nm;
  const m=MATCHES.find(x=>x.id===id);if(!m)return;
  const idx=slip.findIndex(b=>b.id===id&&b.tp===tp);
  if(idx>=0){slip.splice(idx,1);}else{slip.push({id,tp,od,nm,matchName:`${m.t1} vs ${m.t2}`,league:m.lg});}
  updateBadge();highlightSlip();
}

function updateBadge(){
  const badge=$('cpBadge');
  badge.textContent=slip.length;
  badge.style.display=slip.length?'block':'none';
}

function highlightSlip(){
  document.querySelectorAll('.odd-btn').forEach(b=>b.classList.remove('sel'));
  slip.forEach(b=>{
    document.querySelectorAll(`.odd-btn[data-id="${b.id}"][data-tp="${b.tp}"]`).forEach(el=>el.classList.add('sel'));
  });
}

function renderCouponPage(){
  $('sportsBar').style.display='none';
  const c=$('content');
  if(!slip.length){
    c.innerHTML='<div class="coupon-empty"><div style="font-size:48px;">🎟️</div><p>Купон пуст</p><p style="color:#00e5ff;margin-top:8px;">Добавьте события из Линии или LIVE</p></div>';
    return;
  }
  let html='<h2 style="color:#00e5ff;margin-bottom:12px;">🎟️ ВАШ КУПОН</h2>';
  let totalOdds=1;
  slip.forEach((b,i)=>{
    totalOdds*=b.od;
    html+=`<div class="coupon-item"><span class="remove-btn" onclick="removeFromSlip(${i})">✕</span><div style="font-weight:700;">${b.matchName}</div><div style="color:#00e5ff;margin-top:4px;">${b.nm} @ ${b.od}</div></div>`;
  });
  html+=`<div class="coupon-total"><div>Общий коэффициент</div><div class="total-odds">${totalOdds.toFixed(2)}</div><input type="number" id="stake" value="500" min="10" class="input" placeholder="Сумма ставки"><div style="margin:8px 0;">Выигрыш: <b id="winAmt" style="color:#00e5ff;">${F(Math.round(500*totalOdds))} $</b></div><button class="btn btn-primary" onclick="placeBet()">🎯 СДЕЛАТЬ СТАВКУ</button><button class="btn btn-danger" onclick="clearSlip()">🗑 Очистить купон</button></div>`;
  c.innerHTML=html;
}

function removeFromSlip(i){slip.splice(i,1);updateBadge();renderCouponPage();highlightSlip();}
function clearSlip(){slip=[];updateBadge();renderCouponPage();highlightSlip();}

function placeBet(){
  if(!slip.length){tg.showAlert('Добавьте события в купон!');return;}
  const stake=parseFloat($('stake')?.value)||500;
  if(stake<10){tg.showAlert('Минимальная ставка: 10 $');return;}
  if(stake>balance){tg.showAlert('Недостаточно средств!');return;}
  const totalOdds=slip.reduce((a,b)=>a*b.od,1);
  balance-=stake;updateBalance();

function spinSlots(){

  const syms=['🍒','🍋','🍊','🍇','💎','7️⃣','⭐'];

function openCrash(){
  $('content').innerHTML=`<div class="game-screen"><button onclick="switchTab('casino')" style="background:none;border:none;color:#00e5ff;cursor:pointer;font-size:15px;display:block;margin-bottom:10px;">← Назад в Казино</button><h2>🚀 ARA CRASH</h2><div class="crash-display" id="crashMult">1.00x</div><input type="number" id="crashBet" value="50" min="10" class="input"><button class="btn btn-primary" id="crashBtn" onclick="startCrash()">🚀 СТАВКА</button><button class="btn btn-outline" id="crashCash" onclick="cashCrash()" style="display:none;">💰 ЗАБРАТЬ</button></div>`;
}
let crashActive=false,crashMult=1,crashBet=0,crashInterval;
function startCrash(){
  crashBet=parseInt($('crashBet')?.value)||50;if(crashBet>balance){tg.showAlert('Недостаточно средств!');return;}
  balance-=crashBet;updateBalance();crashActive=true;crashMult=1;
  $('crashBtn').style.display='none';$('crashCash').style.display='block';
  const crashPoint=1+Math.random()*15;
  crashInterval=setInterval(()=>{crashMult+=0.05;$('crashMult').textContent=crashMult.toFixed(2)+'x';
    if(crashMult>=crashPoint){clearInterval(crashInterval);crashActive=false;$('crashMult').textContent='💥 КРАШ!';$('crashMult').style.color='#e63946';$('crashBtn').style.display='block';$('crashCash').style.display='none';setTimeout(()=>{$('crashMult').textContent='1.00x';$('crashMult').style.color='#00e5ff';},2000);}
  },80);
}
function cashCrash(){
  if(!crashActive)return;clearInterval(crashInterval);crashActive=false;
  const win=Math.round(crashBet*crashMult);balance+=win;updateBalance();
  tg.showAlert('🚀 ЗАБРАЛ НА '+crashMult.toFixed(2)+'x!\n+'+win+' $');
  $('crashBtn').style.display='block';$('crashCash').style.display='none';$('crashMult').textContent='1.00x';
}

}
function spinRoul(type){
  const bet=parseInt($('roulBet')?.value)||50;if(bet>balance){tg.showAlert('Недостаточно средств!');return;}
  balance-=bet;updateBalance();const n=Math.floor(Math.random()*37);
  const red=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];const c=n===0?'green':red.includes(n)?'red':'black';
  $('roulW').textContent=n===0?'🟢':c==='red'?'🔴':'⚫';
  const won=(type==='red'&&c==='red')||(type==='black'&&c==='black');
  if(won){const w=bet*2;balance+=w;updateBalance();$('roulRes').innerHTML='<span style="color:#00e5ff;">🎉 +'+w+' $!</span>';}else{$('roulRes').innerHTML='<span style="color:#8899aa;">Не повезло</span>';}
}

  let r='',w=0;if(ps>21)r='💔 Перебор!';else if(ds>21){r='🎉 Выигрыш!';w=bet*2;}else if(ps>ds){r='🏆 Выигрыш!';w=bet*2;}else if(ps===ds){r='🤝 Ничья';w=bet;}else r='💔 Поражение';
  if(w>0){balance+=w;updateBalance();}$('bjRes').innerHTML=w>0?`<span style="color:#00e5ff;">${r} +${w} $</span>`:`<span style="color:#8899aa;">${r}</span>`;
