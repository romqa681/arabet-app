    <style>

        .slot-reels{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:#1e2e38;padding:12px;border-radius:16px;margin:12px 0}

        .badge{background:#e63946;color:#fff;border-radius:50%;padding:1px 6px;font-size:9px;position:absolute;top:0;right:20%;display:none}

        @media(max-width:600px){.logo-text{font-size:1.2rem}.header{padding:8px 12px}}

<body>

<script>
const tg=window.Telegram.WebApp;tg.ready();tg.expand();
const $=id=>document.getElementById(id);
const f=n=>Number(n||0).toLocaleString('ru-RU');
const M=[{id:1,s:'football',lg:'Лига Чемпионов',t1:'Реал Мадрид',t2:'Ман Сити',tm:'22:00',live:true,sc:[2,1],min:68,od:{w1:2.45,x:3.40,w2:2.80}},{id:2,s:'football',lg:'Лига Чемпионов',t1:'Арсенал',t2:'Бавария',tm:'22:00',live:true,sc:[1,1],min:55,od:{w1:2.10,x:3.50,w2:3.20}},{id:3,s:'football',lg:'АПЛ',t1:'Ливерпуль',t2:'Кристал Пэлас',tm:'17:00',live:false,od:{w1:1.22,x:6.50,w2:11.0}},{id:4,s:'football',lg:'АПЛ',t1:'Ман Юнайтед',t2:'Ньюкасл',tm:'19:30',live:true,sc:[0,1],min:34,od:{w1:2.80,x:3.50,w2:2.30}},{id:5,s:'football',lg:'АПЛ',t1:'Челси',t2:'Эвертон',tm:'22:00',live:false,od:{w1:1.70,x:3.80,w2:4.50}},{id:6,s:'football',lg:'Ла Лига',t1:'Барселона',t2:'Кадис',tm:'22:00',live:false,od:{w1:1.18,x:7.00,w2:14.0}},{id:7,s:'football',lg:'Серия А',t1:'Интер',t2:'Кальяри',tm:'21:45',live:true,sc:[2,0],min:61,od:{w1:1.15,x:7.50,w2:17.0}},{id:8,s:'football',lg:'Серия А',t1:'Милан',t2:'Лечче',tm:'16:00',live:false,od:{w1:1.55,x:4.00,w2:5.20}},{id:9,s:'football',lg:'Бундеслига',t1:'Байер',t2:'Вердер',tm:'19:30',live:true,sc:[3,0],min:72,od:{w1:1.08,x:9.00,w2:23.0}},{id:10,s:'football',lg:'РПЛ',t1:'Зенит',t2:'Краснодар',tm:'19:00',live:true,sc:[1,0],min:44,od:{w1:1.50,x:4.00,w2:5.50}},{id:11,s:'football',lg:'РПЛ',t1:'Спартак',t2:'ЦСКА',tm:'16:30',live:false,od:{w1:2.50,x:3.10,w2:2.70}},{id:12,s:'tennis',lg:'ATP Тур',t1:'Я. Синнер',t2:'Н. Джокович',tm:'16:00',live:true,sc:[1,0],od:{w1:1.85,w2:1.95}},{id:13,s:'tennis',lg:'WTA Тур',t1:'И. Швёнтек',t2:'А. Соболенко',tm:'14:00',live:false,od:{w1:1.55,w2:2.40}},{id:14,s:'basketball',lg:'НБА',t1:'Лейкерс',t2:'Селтикс',tm:'05:30',live:false,od:{w1:2.10,w2:1.70}},{id:15,s:'basketball',lg:'НБА',t1:'Голден Стэйт',t2:'Милуоки',tm:'03:00',live:true,sc:[98,102],min:42,od:{w1:1.90,w2:1.85}},{id:16,s:'hockey',lg:'НХЛ',t1:'Тампа-Бэй',t2:'Рейнджерс',tm:'03:00',live:false,od:{w1:1.85,x:4.00,w2:3.20}},{id:17,s:'hockey',lg:'КХЛ',t1:'СКА',t2:'Ак Барс',tm:'19:30',live:true,sc:[3,2],min:52,od:{w1:1.50,x:4.50,w2:5.50}}];
let bal=15000,slip=[],ctab='line',csport='all';
document.addEventListener('DOMContentLoaded',()=>{updBal();renderMatches();});
function updBal(){$('bal').textContent=f(bal);}
function tab(t,el){
    ctab=t;
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));if(el)el.classList.add('on');
    document.querySelectorAll('.ni').forEach((x,i)=>{x.classList.remove('on');const map={line:0,live:1,casino:2,coupon:3};if(map[t]===i)x.classList.add('on');});
    if(t==='casino')renderCasino();else if(t==='coupon')renderCouponPage();else{$('sportsBar').style.display='flex';renderMatches();}
}
function sport(s,el){csport=s;document.querySelectorAll('.sport').forEach(x=>x.classList.remove('on'));el.classList.add('on');renderMatches();}
function renderMatches(){
    let m=ctab==='live'?M.filter(x=>x.live):M;if(csport!=='all')m=m.filter(x=>x.s===csport);
    const c=$('content');if(!m.length){c.innerHTML='<div style="text-align:center;padding:40px;color:#8899aa;">Нет матчей</div>';return;}
    let h='';m.forEach(x=>{
        const ti=x.live?`<span class="lv">🔴 LIVE ${x.min}'</span>`:`🕐 ${x.tm}`;
        const s1=x.live&&x.sc?`<div class="sc">${x.sc[0]}</div>`:'';const s2=x.live&&x.sc?`<div class="sc">${x.sc[1]}</div>`:'';
        const xb=x.od.x?`<div class="ob" data-id="${x.id}" data-tp="x" data-od="${x.od.x}" data-nm="X" onclick="togBet(this)"><span class="ot">X</span>${x.od.x}</div>`:'';
        h+=`<div class="card ${x.live?'live':''}"><div class="ch"><span>${x.lg}</span>${ti}</div><div class="teams"><span>${x.t1}${s1}</span><span style="color:#8899aa;">VS</span><span>${x.t2}${s2}</span></div><div class="odds"><div class="ob" data-id="${x.id}" data-tp="w1" data-od="${x.od.w1}" data-nm="П1" onclick="togBet(this)"><span class="ot">П1</span>${x.od.w1}</div>${xb}<div class="ob" data-id="${x.id}" data-tp="w2" data-od="${x.od.w2||x.od.w1}" data-nm="П2" onclick="togBet(this)"><span class="ot">П2</span>${x.od.w2||x.od.w1}</div></div></div>`;});c.innerHTML=h;hilite();}
function togBet(el){const id=parseInt(el.dataset.id),tp=el.dataset.tp,od=parseFloat(el.dataset.od),nm=el.dataset.nm;const m=M.find(x=>x.id===id);if(!m)return;const idx=slip.findIndex(b=>b.id===id&&b.tp===tp);if(idx>=0){slip.splice(idx,1);}else{slip.push({id,tp,od,nm,mn:`${m.t1} vs ${m.t2}`,lg:m.lg});}updSlip();hilite();}
function updSlip(){$('cpBadge').textContent=slip.length;$('cpBadge').style.display=slip.length?'block':'none';}
function hilite(){document.querySelectorAll('.ob').forEach(b=>b.classList.remove('sel'));slip.forEach(b=>{document.querySelectorAll(`.ob[data-id="${b.id}"][data-tp="${b.tp}"]`).forEach(el=>el.classList.add('sel'));});}
function renderCouponPage(){
    $('sportsBar').style.display='none';const c=$('content');
    if(!slip.length){c.innerHTML='<div class="card" style="text-align:center;padding:40px;"><p style="color:#8899aa;">Купон пуст</p><p style="color:#ffaa00;margin-top:10px;">Добавьте события из Линии или LIVE</p></div>';return;}
    let h='<h2 style="color:#ffaa00;margin-bottom:12px;">🎟️ ВАШ КУПОН</h2>',tc=1;slip.forEach((b,i)=>{tc*=b.od;h+=`<div class="cp-item"><span class="rm" onclick="rmSlip(${i})">✕</span><div style="font-weight:700;">${b.mn}</div><div style="color:#ffaa00;margin-top:4px;">${b.nm} @ ${b.od}</div></div>`;});
    h+=`<div class="coupon-panel"><div style="text-align:center;font-size:18px;">Общий кэф: <b style="color:#ffaa00;">${tc.toFixed(2)}</b></div><input type="number" id="stk" value="500" min="10" class="inp" placeholder="Сумма ставки"><div style="text-align:center;">Выигрыш: <b id="winAmt" style="color:#ffb300;">${f(Math.round(500*tc))} $</b></div><button class="btn btn-gold" onclick="placeBet()">🎯 СДЕЛАТЬ СТАВКУ</button><button class="btn btn-out" onclick="clearSlip()">🗑 Очистить купон</button></div>`;c.innerHTML=h;}
function rmSlip(i){slip.splice(i,1);updSlip();renderCouponPage();hilite();}
function clearSlip(){slip=[];updSlip();renderCouponPage();hilite();}
function placeBet(){
    if(!slip.length){tg.showAlert('Добавьте события!');return;}const stk=parseFloat($('stk')?.value)||500;
    if(stk<10){tg.showAlert('Мин: 10 $');return;}if(stk>bal){tg.showAlert('Недостаточно средств!');return;}
    const tc=slip.reduce((a,b)=>a*b.od,1);bal-=stk;updBal();const wa=f(Math.round(stk*tc));
    $('modalAmt').textContent=wa+' $';$('modalInfo').textContent=slip.length+' событий • Кэф '+tc.toFixed(2);$('winModal').classList.add('op');
    slip=[];updSlip();hilite();if(ctab==='coupon')renderCouponPage();else renderMatches();
}
function showProfile(){tg.showAlert('👑 ARAWINBET\n@romqa68\nID: 1458632670\nБаланс: '+f(bal)+' $\n\n💳 Пополнение/вывод:\n@romqa68');}
document.addEventListener('input',e=>{if(e.target.id==='stk'){const tc=slip.reduce((a,b)=>a*b.od,1);$('winAmt').textContent=f(Math.round((parseFloat(e.target.value)||500)*tc))+' $';}});

// КАЗИНО
function renderCasino(){$('sportsBar').style.display='none';$('content').innerHTML=`<h2 style="color:#ffaa00;margin-bottom:12px;">🎰 ARAWIN КАЗИНО</h2><div class="casino-grid"><div class="cc" onclick="openSlots()"><div class="gi">🎰</div><div class="gn">Слоты</div><div class="gd">5x3 • RTP 96%</div></div><div class="cc" onclick="openCrash()"><div class="gi">🚀</div><div class="gn">ARA Crash</div><div class="gd">До x1000</div></div><div class="cc" onclick="openRoulette()"><div class="gi">🎡</div><div class="gn">Рулетка</div><div class="gd">RTP 97%</div></div><div class="cc" onclick="openBlackjack()"><div class="gi">🃏</div><div class="gn">Блэкджек</div><div class="gd">RTP 99%</div></div></div>`;}
function openSlots(){$('content').innerHTML=`<div class="game-screen"><button onclick="tab('casino')" style="background:none;border:none;color:#ffaa00;cursor:pointer;font-size:16px;display:block;margin-bottom:10px;">← Назад</button><h2>🎰 СЛОТЫ</h2><div class="slot-reels"><div class="slot-reel">🍒</div><div class="slot-reel">🍋</div><div class="slot-reel">🍊</div><div class="slot-reel">🍇</div><div class="slot-reel">💎</div></div><input type="number" id="slotBet" value="10" min="5" class="inp"><button class="btn btn-gold" onclick="spinSlots()">🎰 КРУТИТЬ</button><p id="slotRes" style="margin-top:10px;font-weight:700;"></p></div>`;}
function spinSlots(){const bet=parseInt($('slotBet')?.value)||10;if(bet>bal){tg.showAlert('Недостаточно средств!');return;}bal-=bet;updBal();const syms=['🍒','🍋','🍊','🍇','💎','7️⃣','⭐'];const reels=document.querySelectorAll('.slot-reel');let spins=0;const int=setInterval(()=>{reels.forEach(r=>r.textContent=syms[Math.floor(Math.random()*syms.length)]);spins++;if(spins>=10){clearInterval(int);const r=[syms[Math.floor(Math.random()*syms.length)],syms[Math.floor(Math.random()*syms.length)],syms[Math.floor(Math.random()*syms.length)],syms[Math.floor(Math.random()*syms.length)],syms[Math.floor(Math.random()*syms.length)]];reels[0].textContent=r[0];reels[1].textContent=r[1];reels[2].textContent=r[2];reels[3].textContent=r[3];reels[4].textContent=r[4];const w=r[0]===r[1]&&r[1]===r[2]?bet*10:r[0]===r[1]?bet*2:0;if(w>0){bal+=w;updBal();$('slotRes').innerHTML='<span style="color:#ffaa00;">🎉 +'+w+' $!</span>';}else{$('slotRes').innerHTML='<span style="color:#8899aa;">Попробуй ещё!</span>';}}},80);}
function openCrash(){$('content').innerHTML=`<div class="game-screen"><button onclick="tab('casino')" style="background:none;border:none;color:#ffaa00;cursor:pointer;font-size:16px;display:block;margin-bottom:10px;">← Назад</button><h2>🚀 ARA CRASH</h2><div class="crash-display" id="crashMult">1.00x</div><input type="number" id="crashBet" value="50" min="10" class="inp"><button class="btn btn-gold" id="crashBtn" onclick="startCrash()">🚀 СТАВКА</button><button class="btn btn-out" id="crashCash" onclick="cashCrash()" style="display:none;">💰 ЗАБРАТЬ</button></div>`;}
let ca=false,cm=1,cb=0,ci=null;
function startCrash(){cb=parseInt($('crashBet')?.value)||50;if(cb>bal){tg.showAlert('Недостаточно средств!');return;}bal-=cb;updBal();ca=true;cm=1;$('crashBtn').style.display='none';$('crashCash').style.display='block';const cp=1+Math.random()*15;ci=setInterval(()=>{cm+=0.05;$('crashMult').textContent=cm.toFixed(2)+'x';if(cm>=cp){clearInterval(ci);ca=false;$('crashMult').textContent='💥 КРАШ!';$('crashBtn').style.display='block';$('crashCash').style.display='none';setTimeout(()=>{$('crashMult').textContent='1.00x';},2000);}},80);}
function cashCrash(){if(!ca)return;clearInterval(ci);ca=false;const w=Math.round(cb*cm);bal+=w;updBal();tg.showAlert('🚀 ЗАБРАЛ НА '+cm.toFixed(2)+'x!\n+'+w+' $');$('crashBtn').style.display='block';$('crashCash').style.display='none';$('crashMult').textContent='1.00x';}
function openRoulette(){$('content').innerHTML=`<div class="game-screen"><button onclick="tab('casino')" style="background:none;border:none;color:#ffaa00;cursor:pointer;font-size:16px;display:block;margin-bottom:10px;">← Назад</button><h2>🎡 РУЛЕТКА</h2><div style="font-size:60px;margin:15px 0;" id="roulW">🎡</div><input type="number" id="roulBet" value="50" min="10" class="inp"><button class="btn btn-gold" onclick="spinRoul('red')">🔴 Красное x2</button><button class="btn btn-gold" onclick="spinRoul('black')" style="margin-top:4px;">⚫ Чёрное x2</button><p id="roulRes" style="margin-top:10px;"></p></div>`;}
function spinRoul(t){const b=parseInt($('roulBet')?.value)||50;if(b>bal){tg.showAlert('Недостаточно средств!');return;}bal-=b;updBal();const n=Math.floor(Math.random()*37);const red=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];const c=n===0?'green':red.includes(n)?'red':'black';$('roulW').textContent=n===0?'🟢':c==='red'?'🔴':'⚫';const won=(t==='red'&&c==='red')||(t==='black'&&c==='black');if(won){const w=b*2;bal+=w;updBal();$('roulRes').innerHTML='<span style="color:#ffaa00;">🎉 +'+w+' $!</span>';}else{$('roulRes').innerHTML='<span style="color:#8899aa;">Не повезло</span>';}}
function openBlackjack(){$('content').innerHTML=`<div class="game-screen"><button onclick="tab('casino')" style="background:none;border:none;color:#ffaa00;cursor:pointer;font-size:16px;display:block;margin-bottom:10px;">← Назад</button><h2>🃏 БЛЭКДЖЕК</h2><div style="margin:12px 0;" id="bjA"><p>Дилер: ?</p><p>Вы: ?</p></div><input type="number" id="bjBet" value="25" min="10" class="inp"><button class="btn btn-gold" onclick="dealBJ()">🎮 СДАТЬ</button><p id="bjRes" style="margin-top:10px;"></p></div>`;}
function dealBJ(){const b=parseInt($('bjBet')?.value)||25;if(b>bal){tg.showAlert('Недостаточно средств!');return;}bal-=b;updBal();const ps=Math.floor(Math.random()*11)+14,ds=Math.floor(Math.random()*11)+14;$('bjA').innerHTML=`<p>Дилер: <b>${ds}</b>${ds>21?' 💥':''}</p><p>Вы: <b>${ps}</b>${ps>21?' 💥':''}</p>`;let r='',w=0;if(ps>21)r='💔 Перебор!';else if(ds>21){r='🎉 Выигрыш!';w=b*2;}else if(ps>ds){r='🏆 Выигрыш!';w=b*2;}else if(ps===ds){r='🤝 Ничья';w=b;}else r='💔 Поражение';if(w>0){bal+=w;updBal();}$('bjRes').innerHTML=w>0?`<span style="color:#ffaa00;">${r} +${w} $</span>`:`<span style="color:#8899aa;">${r}</span>`;}
</script>
</body>
