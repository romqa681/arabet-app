<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>ARAWINBET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root{--g:#00ff88;--b:#0a0a0a;--c:#111;--d:#1a1a1a;--r:#ff3333;--t:#fff;--s:#aaa;--x:#333}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--b);color:var(--t);overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
        
        .header{background:rgba(10,10,10,.95);position:fixed;top:0;left:0;right:0;z-index:100;border-bottom:2px solid var(--g);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
        .logo{color:var(--g);font-weight:900;font-size:17px}
        .bal{background:var(--d);padding:7px 14px;border-radius:50px;font-weight:700;font-size:13px;cursor:pointer;border:1px solid var(--x)}
        
        .hero{margin-top:50px;height:150px;background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.85)),url('https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=800');background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;text-align:center}
        .hero h1{font-size:26px;color:var(--g)}.hero p{color:#ccc;font-size:13px}
        
        .stats{background:var(--c);padding:8px 16px;display:flex;justify-content:space-between;font-size:11px;border-bottom:1px solid var(--x)}
        
        .tabs{display:flex;background:var(--c);padding:6px 8px;gap:6px;position:sticky;top:50px;z-index:99}
        .tab{padding:9px 18px;background:var(--d);border:none;border-radius:50px;color:var(--s);font-weight:600;cursor:pointer;white-space:nowrap;font-size:12px}
        .tab.on{background:var(--g);color:#000}
        
        .sports{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;background:var(--b)}
        .sport{padding:6px 12px;background:var(--d);border:1px solid var(--x);border-radius:50px;font-weight:600;cursor:pointer;white-space:nowrap;font-size:11px;color:var(--s)}
        .sport.on{background:var(--g);color:#000;border-color:var(--g)}
        
        .main-layout{display:flex;padding:0 8px;gap:0}
        .content-area{flex:1;min-width:0}
        
        .card{background:var(--c);margin-bottom:8px;border-radius:12px;overflow:hidden;border:1px solid var(--x)}
        .card.live{border:2px solid var(--r)}
        .ch{display:flex;justify-content:space-between;padding:9px 12px;background:var(--d);font-size:10px;color:var(--s)}
        .lv{color:var(--r);font-weight:700;animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .ct{display:flex;padding:12px;align-items:center}
        .tm{flex:1;text-align:center;font-weight:700;font-size:12px}
        .sc{font-size:20px;font-weight:900;margin-top:2px}.sc.lv{color:var(--r)}
        .vs{color:#555;font-size:13px;padding:0 10px}
        .co{display:flex;gap:4px;padding:0 12px 12px}
        .ob{flex:1;padding:11px 4px;background:var(--d);border:1px solid var(--x);border-radius:8px;text-align:center;cursor:pointer;font-weight:700;font-size:12px;color:var(--t);transition:.1s}
        .ob:active{background:var(--g);color:#000}.ob.sel{background:var(--g)!important;color:#000!important}
        
        .coupon-sidebar{width:280px;background:var(--c);border-radius:12px;padding:14px;position:sticky;top:110px;align-self:flex-start;max-height:calc(100vh-120px);overflow-y:auto;display:block;margin-left:8px;border:1px solid var(--x)}
        .cph{margin-bottom:10px;font-weight:700;font-size:14px}
        .ci{background:var(--d);padding:10px;border-radius:8px;margin-bottom:6px;font-size:11px}
        .ci .rm{color:var(--r);cursor:pointer;font-size:16px}
        .btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;margin-top:6px}.btn:active{transform:scale(.97)}
        .btn-g{background:var(--g);color:#000}.btn-c{background:transparent;color:var(--s);border:1px solid var(--x)}
        .inp{width:100%;padding:10px;background:var(--d);border:1px solid var(--x);border-radius:6px;color:var(--t);font-size:14px;font-weight:600;text-align:center;outline:none}.inp:focus{border-color:var(--g)}
        
        .coupon-mobile{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--c);border-top:3px solid var(--g);z-index:200;transform:translateY(100%);transition:.3s;max-height:50vh;overflow-y:auto}
        .coupon-mobile.op{transform:translateY(0)}
        
        .bn{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--c);padding:6px 0;border-top:1px solid var(--x);z-index:300;justify-content:space-around}
        .ni{text-align:center;cursor:pointer;color:var(--s);font-size:10px}.ni.on{color:var(--g)}.ni span{font-size:18px}
        
        .casino-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px}
        .cc{background:linear-gradient(145deg,var(--c),var(--d));border-radius:12px;padding:18px 12px;text-align:center;cursor:pointer;border:1px solid var(--x)}.cc:active{transform:scale(.96);border-color:var(--g)}.cc .gi{font-size:36px;margin-bottom:4px}.cc .gn{font-weight:700;font-size:13px}.cc .gd{font-size:10px;color:var(--s)}
        
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:.3s}
        .modal.op{opacity:1;visibility:visible}
        .modal-inner{background:var(--c);border-radius:16px;padding:24px;text-align:center;max-width:320px;width:90%;border:2px solid var(--g)}
        .modal-inner h3{color:var(--g);margin-bottom:12px}
        .modal-inner .amount{font-size:32px;font-weight:900;color:var(--g)}
        
        @media(max-width:768px){
            .coupon-sidebar{display:none}
            .coupon-mobile{display:block}
            .bn{display:flex}
            .main-layout{padding-bottom:60px}
            .hero{height:120px}.hero h1{font-size:20px}
        }
    </style>
</head>
<body>
<div class="header"><div class="logo">🅰️ ARAWIN<span style="color:#fff;">BET</span></div><div class="bal" onclick="showProfile()">💰 <span id="bal">15000</span> ₽</div></div>
<div class="hero"><div><h1>ARAWINBET</h1><p>🏔️ Премиум букмекерская контора</p></div></div>
<div class="stats"><span>👥 Онлайн: <b style="color:var(--g);" id="onl">1247</b></span><span>💎 Выплачено: <b>12.4M ₽</b></span></div>
<div class="tabs"><button class="tab on" onclick="tab('line',this)">📊 ЛИНИЯ</button><button class="tab" onclick="tab('live',this)">🔴 LIVE</button><button class="tab" onclick="tab('casino',this)">🎰 КАЗИНО</button></div>
<div class="sports"><button class="sport on" onclick="sport('all',this)">🔥 Все</button><button class="sport" onclick="sport('football',this)">⚽ Футбол</button><button class="sport" onclick="sport('tennis',this)">🎾 Теннис</button><button class="sport" onclick="sport('basketball',this)">🏀 Баскетбол</button><button class="sport" onclick="sport('hockey',this)">🏒 Хоккей</button></div>

<div class="main-layout">
    <div class="content-area" id="content"></div>
    <div class="coupon-sidebar" id="couponSidebar">
        <div class="cph">📋 Купон (<span id="cpc">0</span>)</div>
        <div id="cpi"><div style="color:var(--s);text-align:center;padding:20px;">Добавьте события</div></div>
        <div style="border-top:1px solid var(--x);padding-top:8px;margin-top:8px;">
            <div style="display:flex;justify-content:space-between;margin:6px 0;font-size:12px;">Кэф: <b id="todd" style="color:var(--g);">1.00</b></div>
            <input type="number" id="stk" value="500" min="10" class="inp">
            <div style="display:flex;justify-content:space-between;margin:6px 0;font-size:12px;">Выигрыш: <b id="win" style="color:var(--g);">500 ₽</b></div>
            <button class="btn btn-g" onclick="bet()">🎯 СДЕЛАТЬ СТАВКУ</button>
            <button class="btn btn-c" onclick="clearCp()">🗑 Очистить</button>
        </div>
    </div>
</div>

<div class="coupon-mobile" id="couponMobile">
    <div class="cph" style="display:flex;justify-content:space-between;background:var(--d);padding:12px;">📋 Купон (<span id="cpc2">0</span>)<span onclick="toggleCpMobile()" style="cursor:pointer;">✕</span></div>
    <div style="padding:12px;"><div id="cpi2"></div>
    <div style="border-top:1px solid var(--x);padding-top:8px;margin-top:8px;">
        <div style="display:flex;justify-content:space-between;margin:6px 0;font-size:12px;">Кэф: <b id="todd2" style="color:var(--g);">1.00</b></div>
        <input type="number" id="stk2" value="500" min="10" class="inp">
        <div style="display:flex;justify-content:space-between;margin:6px 0;font-size:12px;">Выигрыш: <b id="win2" style="color:var(--g);">500 ₽</b></div>
        <button class="btn btn-g" onclick="bet()">🎯 СДЕЛАТЬ СТАВКУ</button>
        <button class="btn btn-c" onclick="clearCp()">🗑 Очистить</button>
    </div></div>
</div>

<div class="bn"><div class="ni on" onclick="tab('line')"><span>⚽</span><br>Линия</div><div class="ni" onclick="tab('live')"><span>🔴</span><br>LIVE</div><div class="ni" onclick="tab('casino')"><span>🎰</span><br>Казино</div><div class="ni" onclick="toggleCpMobile()"><span>📋</span><br>Купон</div><div class="ni" onclick="showProfile()"><span>👤</span><br>Профиль</div></div>

<div class="modal" id="betModal"><div class="modal-inner"><h3>✅ СТАВКА ПРИНЯТА!</h3><div class="amount" id="modalAmount"></div><p style="margin:8px 0;color:var(--s);" id="modalInfo"></p><button class="btn btn-g" onclick="$('betModal').classList.remove('op')">ОК</button></div></div>

<script>
const tg=window.Telegram.WebApp;tg.ready();tg.expand();
const $=id=>document.getElementById(id);
const f=n=>Number(n||0).toLocaleString('ru-RU');
const M=[{id:1,s:'football',lg:'Лига Чемпионов',t1:'Реал Мадрид',t2:'Ман Сити',tm:'22:00',live:true,sc:[2,1],min:68,od:{w1:2.45,x:3.40,w2:2.80}},{id:2,s:'football',lg:'Лига Чемпионов',t1:'Арсенал',t2:'Бавария',tm:'22:00',live:true,sc:[1,1],min:55,od:{w1:2.10,x:3.50,w2:3.20}},{id:3,s:'football',lg:'АПЛ',t1:'Ливерпуль',t2:'Кристал Пэлас',tm:'17:00',live:false,od:{w1:1.22,x:6.50,w2:11.0}},{id:4,s:'football',lg:'АПЛ',t1:'Ман Юнайтед',t2:'Ньюкасл',tm:'19:30',live:true,sc:[0,1],min:34,od:{w1:2.80,x:3.50,w2:2.30}},{id:5,s:'football',lg:'АПЛ',t1:'Челси',t2:'Эвертон',tm:'22:00',live:false,od:{w1:1.70,x:3.80,w2:4.50}},{id:6,s:'football',lg:'Ла Лига',t1:'Барселона',t2:'Кадис',tm:'22:00',live:false,od:{w1:1.18,x:7.00,w2:14.0}},{id:7,s:'football',lg:'Серия А',t1:'Интер',t2:'Кальяри',tm:'21:45',live:true,sc:[2,0],min:61,od:{w1:1.15,x:7.50,w2:17.0}},{id:8,s:'football',lg:'Серия А',t1:'Милан',t2:'Лечче',tm:'16:00',live:false,od:{w1:1.55,x:4.00,w2:5.20}},{id:9,s:'football',lg:'Бундеслига',t1:'Байер',t2:'Вердер',tm:'19:30',live:true,sc:[3,0],min:72,od:{w1:1.08,x:9.00,w2:23.0}},{id:10,s:'football',lg:'РПЛ',t1:'Зенит',t2:'Краснодар',tm:'19:00',live:true,sc:[1,0],min:44,od:{w1:1.50,x:4.00,w2:5.50}},{id:11,s:'football',lg:'РПЛ',t1:'Спартак',t2:'ЦСКА',tm:'16:30',live:false,od:{w1:2.50,x:3.10,w2:2.70}},{id:12,s:'tennis',lg:'ATP Тур',t1:'Я. Синнер',t2:'Н. Джокович',tm:'16:00',live:true,sc:[1,0],od:{w1:1.85,w2:1.95}},{id:13,s:'tennis',lg:'WTA Тур',t1:'И. Швёнтек',t2:'А. Соболенко',tm:'14:00',live:false,od:{w1:1.55,w2:2.40}},{id:14,s:'basketball',lg:'НБА',t1:'Лейкерс',t2:'Селтикс',tm:'05:30',live:false,od:{w1:2.10,w2:1.70}},{id:15,s:'basketball',lg:'НБА',t1:'Голден Стэйт',t2:'Милуоки',tm:'03:00',live:true,sc:[98,102],min:42,od:{w1:1.90,w2:1.85}},{id:16,s:'hockey',lg:'НХЛ',t1:'Тампа-Бэй',t2:'Рейнджерс',tm:'03:00',live:false,od:{w1:1.85,x:4.00,w2:3.20}},{id:17,s:'hockey',lg:'КХЛ',t1:'СКА',t2:'Ак Барс',tm:'19:30',live:true,sc:[3,2],min:52,od:{w1:1.50,x:4.50,w2:5.50}}];
let bal=15000,cp=[],ctab='line',csport='all';
document.addEventListener('DOMContentLoaded',()=>{updBal();render();updCp();setInterval(()=>{$('onl').textContent=f(Math.floor(1000+Math.random()*500));},5000);});
function updBal(){$('bal').textContent=f(bal);}
function tab(t,el){ctab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));if(el)el.classList.add('on');if(t==='casino')renderCasino();else render();}
function sport(s,el){csport=s;document.querySelectorAll('.sport').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();}
function render(){let m=ctab==='live'?M.filter(x=>x.live):M;if(csport!=='all')m=m.filter(x=>x.s===csport);const c=$('content');if(!m.length){c.innerHTML='<div style="text-align:center;padding:40px;color:var(--s);"><div style="font-size:50px;">📭</div><p>Нет матчей</p></div>';return;}let h='';m.forEach(x=>{const ti=x.live?`<span class="lv">🔴 LIVE ${x.min}'</span>`:`🕐 ${x.tm}`;const s1=x.live&&x.sc?`<div class="sc lv">${x.sc[0]}</div>`:'';const s2=x.live&&x.sc?`<div class="sc lv">${x.sc[1]}</div>`:'';const xb=x.od.x?`<div class="ob" data-id="${x.id}" data-tp="x" data-od="${x.od.x}" data-nm="X" onclick="tog(this)">X<br>${x.od.x}</div>`:'';h+=`<div class="card ${x.live?'live':''}"><div class="ch"><span>${x.lg}</span>${ti}</div><div class="ct"><div class="tm">${x.t1}${s1}</div><div class="vs">VS</div><div class="tm">${x.t2}${s2}</div></div><div class="co"><div class="ob" data-id="${x.id}" data-tp="w1" data-od="${x.od.w1}" data-nm="П1" onclick="tog(this)">П1<br>${x.od.w1}</div>${xb}<div class="ob" data-id="${x.id}" data-tp="w2" data-od="${x.od.w2||x.od.w1}" data-nm="П2" onclick="tog(this)">П2<br>${x.od.w2||x.od.w1}</div></div></div>`;});c.innerHTML=h;hilite();}
function tog(el){const id=parseInt(el.dataset.id),tp=el.dataset.tp,od=parseFloat(el.dataset.od),nm=el.dataset.nm;const m=M.find(x=>x.id===id);if(!m)return;const idx=cp.findIndex(b=>b.id===id&&b.tp===tp);if(idx>=0){cp.splice(idx,1);}else{cp.push({id,tp,od,nm,mn:`${m.t1} vs ${m.t2}`,lg:m.lg});}updCp();hilite();}
function updCp(){
    $('cpc').textContent=cp.length;$('cpc2').textContent=cp.length;
    const ci=$('cpi'),ci2=$('cpi2'),todd=$('todd'),todd2=$('todd2'),win=$('win'),win2=$('win2');
    if(!cp.length){
        ci.innerHTML='<div style="color:var(--s);text-align:center;padding:20px;">Добавьте события</div>';
        ci2.innerHTML='<div style="color:var(--s);text-align:center;padding:20px;">Добавьте события</div>';
        todd.textContent='1.00';todd2.textContent='1.00';win.textContent='0 ₽';win2.textContent='0 ₽';return;
    }
    let h='',tc=1;cp.forEach((b,i)=>{tc*=b.od;h+=`<div class="ci"><div style="color:var(--s);font-size:9px;">${b.lg}</div><div>${b.mn}</div><div style="display:flex;justify-content:space-between;margin-top:3px;"><span style="color:var(--g);">${b.nm} @ ${b.od}</span><span class="rm" onclick="rmCp(${i})">✕</span></div></div>`;});
    ci.innerHTML=h;ci2.innerHTML=h;
    todd.textContent=tc.toFixed(2);todd2.textContent=tc.toFixed(2);
    const stk=parseFloat($('stk')?.value)||500,stk2=parseFloat($('stk2')?.value)||500;
    win.textContent=f(Math.round(stk*tc))+' ₽';win2.textContent=f(Math.round(stk2*tc))+' ₽';
}
function rmCp(i){cp.splice(i,1);updCp();hilite();}
function clearCp(){cp=[];updCp();hilite();}
function hilite(){document.querySelectorAll('.ob').forEach(b=>b.classList.remove('sel'));cp.forEach(b=>{document.querySelectorAll(`.ob[data-id="${b.id}"][data-tp="${b.tp}"]`).forEach(el=>el.classList.add('sel'));});}
function toggleCpMobile(){$('couponMobile').classList.toggle('op');}
function bet(){
    if(!cp.length){tg.showAlert('Добавьте события!');return;}
    const isMobile=window.innerWidth<=768;
    const stk=parseFloat($(isMobile?'stk2':'stk')?.value)||500;
    if(stk<10){tg.showAlert('Мин: 10 ₽');return;}
    if(stk>bal){tg.showAlert('Недостаточно средств!');return;}
    const tc=cp.reduce((a,b)=>a*b.od,1);
    bal-=stk;updBal();
    const winAmount=f(Math.round(stk*tc));
    $('modalAmount').textContent=winAmount+' ₽';
    $('modalInfo').textContent=cp.length+' событий • Кэф '+tc.toFixed(2)+' • Ставка '+stk+' ₽';
    $('betModal').classList.add('op');
    cp=[];updCp();hilite();
}
function renderCasino(){$('content').innerHTML=`<div class="casino-grid"><div class="cc" onclick="tg.showAlert('🎰 Слоты — скоро!\n@romqa68')"><div class="gi">🎰</div><div class="gn">Слоты</div><div class="gd">Gates of Olympus</div></div><div class="cc" onclick="crash()"><div class="gi">🚀</div><div class="gn">ARA Crash</div><div class="gd">До x1000</div></div><div class="cc" onclick="tg.showAlert('🎡 Рулетка — скоро!\n@romqa68')"><div class="gi">🎡</div><div class="gn">Рулетка</div><div class="gd">RTP 97.3%</div></div><div class="cc" onclick="tg.showAlert('🃏 Блэкджек — скоро!\n@romqa68')"><div class="gi">🃏</div><div class="gn">Блэкджек</div><div class="gd">RTP 99.5%</div></div></div>`;}
function crash(){if(bal<50){tg.showAlert('Мин: 50 ₽');return;}bal-=50;updBal();const cr=1+Math.random()*10;tg.showAlert('🚀 Crash запущен!');setTimeout(()=>{const won=Math.random()>0.4;if(won){const w=Math.round(50*cr);bal+=w;updBal();tg.showAlert('🚀 ЗАБРАЛ НА '+cr.toFixed(2)+'x!\n+'+w+' ₽');}else{tg.showAlert('💥 КРАШ на '+cr.toFixed(2)+'x');}},2000);}
function showProfile(){tg.showAlert('👑 ARAWINBET\n@romqa68\nID: 1458632670\nБаланс: '+f(bal)+' ₽\nСтатус: Владелец\n\n💳 Пополнение/вывод:\n@romqa68');}
document.addEventListener('input',e=>{if(e.target.id==='stk'||e.target.id==='stk2')updCp();});
</script>
</body>
</html>
